<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cochera — Ingreso / Salida</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="noseleccionable">

<header>
  <div>
    <h1>Cochera</h1>
  </div>
  <div class="top-actions">
    <button id="collectBtn" class="big-btn muted" style="display:none" title="Recolectar">Recolectar</button>
  </div>
</header>

<!-- FORM (campo único de matrícula) -->
<div class="card">
  <form id="formIngreso" autocomplete="off">
    <label for="matricula">Matrícula</label>
    <input id="matricula" name="matricula" type="text" inputmode="latin"
           autocomplete="off" placeholder="Ej: ABC123" required minlength="2" />

    <div style="height:8px"></div>

    <label for="tarifa">Tarifa</label>
    <select id="tarifa" name="tarifa">
      <option value="auto_viejo">Auto viejo (Día S/.5 | Noche S/.7)</option>
      <option value="auto_nuevo">Auto nuevo (Día S/.6 | Noche S/.8)</option>
      <option value="mototaxi">Mototaxi (Día S/.2 | Noche S/.4)</option>
      <option value="moto_lineal">Moto lineal (Día S/.2 | Noche S/.3)</option>
      <option value="triciclo">Triciclo (Día S/.1 | Noche S/.4)</option>
      <option value="afilador">Afilador (Día S/.1 | Noche S/.2)</option>
      <option value="camion">Camión (Día S/.7 | Noche S/.12)</option>
      <option value="otro">Otro (Personalizado)</option>
    </select>

    <div class="quick">
      <!-- Aquí antes estaban los quick-buttons: ahora quedan dos inputs ocultos que aparecen al seleccionar "Otro" -->
      <input id="customDia" class="custom-tarifa" type="number" inputmode="decimal" min="1" step="0.01" placeholder="Día: S/." style="display:none" />
      <input id="customNoche" class="custom-tarifa" type="number" inputmode="decimal" min="1" step="0.01" placeholder="Noche: S/." style="display:none" />
    </div>

    <div style="height:8px"></div>

    <label for="adelanto">Adelanto (S/)</label>
    <input id="adelanto" name="adelanto" type="number" inputmode="decimal"
           min="0" step="0.01" placeholder="0.00" />

    <div style="height:10px"></div>

    <div class="row">
      <button id="guardarBtn" class="big-btn primary" type="submit">Guardar ingreso</button>
    </div>
  </form>
</div>

<!-- TABLA (sin campo de filtro separado) -->
<div class="card" style="margin-bottom:120px">
  <table id="tabla" aria-live="polite">
    <thead>
      <tr>
        <th>Matrícula</th>
        <th>Ingreso</th>
        <th>Tarifa</th>
        <th>Acción</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<!-- MODAL RETIRO -->
<div id="modal" aria-hidden="true">
  <div class="modal-box">
    <p id="modal-text">Retirar ?</p>
    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:12px">
      <button id="modal-no" class="big-btn muted" style="width:110px">NO</button>
      <button id="modal-si" class="big-btn danger" style="width:110px">SI</button>
    </div>
  </div>
</div>

<!-- MODAL RECOLECCION -->
<div id="collectModal" aria-hidden="true" style="display:none">
  <div class="modal-box">
    <p id="collect-modal-text">Recoger: S/ 0.00</p>
    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:12px">
      <button id="collect-no" class="big-btn muted" style="width:110px">NO</button>
      <button id="collect-si" class="big-btn danger" style="width:110px">SI</button>
    </div>
  </div>
</div>

<!-- MODAL AUTH (se muestra si no estás autenticado) -->
<div id="authModal" aria-hidden="true" style="display:none; position:fixed; inset:0; z-index:2000; align-items:center; justify-content:center; background: rgba(0,0,0,0.4);">
  <div class="modal-box" style="min-width:320px;">
    <h3 style="margin:0 0 8px 0">Iniciar sesión</h3>
    <input id="authEmail" type="email" placeholder="Correo" style="margin-bottom:8px; width:100%; padding:10px; border-radius:8px; border:1px solid #ddd" />
    <input id="authPassword" type="password" placeholder="Contraseña" style="margin-bottom:8px; width:100%; padding:10px; border-radius:8px; border:1px solid #ddd" />
    <div style="display:flex; gap:8px; justify-content:flex-end; margin-top:6px;">
      <button id="authLoginBtn" class="big-btn primary" style="width:120px">Iniciar</button>
    </div>
  </div>
</div>

<!-- CONTAINER PARA TOASTS -->
<div id="toast-container" aria-live="polite" aria-atomic="true"></div>

<!-- Supabase + Dexie (CDNs) y aplicación -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/dexie@latest/dist/dexie.min.js"></script>
<script src="app.js"></script>
</body>
</html>
